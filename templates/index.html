<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- viewport fit=cover handles mobile notched screens -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, fit=cover">
  <title>The Taunting Number Game</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    html, body {
      width: 100%;
      height: 100%;
      /* svh (small viewport height) prevents layout shifts when mobile address bars hide/show */
      min-height: 100svh; 
      overflow: hidden; 
      position: relative;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }

    .game-card {
      background: #1e293b;
      padding: 2rem 1.5rem;
      border-radius: 16px;
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5);
      width: 100%;
      max-width: 380px;
      text-align: center;
      z-index: 10; /* Keep main UI above floating taunts */
      border: 1px solid #334155;
    }

    h2 { margin-bottom: 0.5rem; color: #38bdf8; font-size: 1.5rem; }
    p.subtitle { color: #94a3b8; font-size: 0.85rem; margin-bottom: 1.25rem; }

    input[type="number"] {
      width: 100%;
      padding: 0.8rem;
      font-size: 1.25rem; /* 16px+ prevents iOS auto-zoom on input tap */
      text-align: center;
      border-radius: 8px;
      border: 2px solid #334155;
      background: #0f172a;
      color: #fff;
      outline: none;
      margin-bottom: 1rem;
      -webkit-appearance: none;
    }
    input[type="number"]:focus { border-color: #38bdf8; }

    button {
      width: 100%;
      padding: 0.85rem;
      font-size: 1rem;
      font-weight: bold;
      background: #38bdf8;
      color: #0f172a;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      touch-action: manipulation;
    }
    button:active { transform: scale(0.98); }

    .feedback {
      margin-top: 1rem;
      font-size: 1rem;
      font-weight: 600;
      min-height: 24px;
    }

    /* Screen shake */
    .shake { animation: shake 0.4s ease-in-out; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    /* Responsive Floating Taunt Styles */
    .floating-taunt {
      position: fixed;
      pointer-events: none;
      font-weight: 900;
      white-space: nowrap;
      z-index: 5;
      /* Clamp font size so text never overflows small screens */
      font-size: clamp(0.9rem, 4vw, 1.3rem);
      animation: floatUpAndFade 3s forwards cubic-bezier(0.1, 0.8, 0.3, 1);
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9), 0 0 2px #000;
      will-change: transform, opacity; /* GPU acceleration for smooth mobile FPS */
    }

    @keyframes floatUpAndFade {
      0% {
        opacity: 0;
        transform: translate3d(0, 10px, 0) scale(0.6) rotate(0deg);
      }
      15% {
        opacity: 1;
        transform: translate3d(0, -15px, 0) scale(1.05) rotate(var(--rot));
      }
      80% {
        opacity: 0.9;
      }
      100% {
        opacity: 0;
        /* Moves upward based on screen height */
        transform: translate3d(0, -35svh, 0) scale(0.95) rotate(calc(var(--rot) * 1.5));
      }
    }
  </style>
</head>
<body>

  <div class="game-card" id="card">
    <h2>Can You Guess It?</h2>
    <p class="subtitle">Pick a number between 1 and 100</p>

    <form id="guess-form">
      <input type="number" id="guess-input" min="1" max="100" required placeholder="Type here..." inputmode="numeric">
      <button type="submit">Take a Shot</button>
    </form>

    <div id="feedback" class="feedback"></div>
  </div>

  <script>
    const form = document.getElementById('guess-form');
    const guessInput = document.getElementById('guess-input');
    const feedback = document.getElementById('feedback');
    const card = document.getElementById('card');

    const tauntPhrases = [
      "🤡 Is that your best?",
      "📉 Terrible choice!",
      "🙈 My eyes! Try harder!",
      "💩 Not even close!",
      "📊 Bad guess!",
      "🤖 Toaster guesses better!",
      "💤 Yawn... try again!",
      "🌶️ Oof, terrible!"
    ];

    const winPhrases = [
      "👑 ABSOLUTE GENIUS!",
      "🎉 YOU DID IT!",
      "🔥 UNSTOPPABLE!",
      "🚀 CORRECT!",
      "🏆 CHAMPION!"
    ];

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      const userGuess = guessInput.value;

      const response = await fetch('/guess', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ guess: userGuess })
      });

      const data = await response.json();
      feedback.textContent = data.message;

      if (data.status === 'win') {
        feedback.style.color = '#4ade80';
        spawnFloatingBatch(winPhrases, '#4ade80', 8);
        guessInput.value = '';
      } else {
        feedback.style.color = '#f87171';
        
        card.classList.remove('shake');
        void card.offsetWidth;
        card.classList.add('shake');

        // Spawn fewer taunts on smaller screens to keep UI uncluttered
        const count = window.innerWidth < 480 ? 3 : 5;
        spawnFloatingBatch(tauntPhrases, '#f87171', count);
        
        // Keep focus on mobile without triggering unwanted zoom
        guessInput.blur(); 
        setTimeout(() => guessInput.focus(), 50);
      }
    });

    function spawnFloatingBatch(phrasesArray, color, count) {
      for (let i = 0; i < count; i++) {
        setTimeout(() => {
          const text = phrasesArray[Math.floor(Math.random() * phrasesArray.length)];
          createFloatingText(text, color);
        }, i * 150);
      }
    }

    function createFloatingText(text, color) {
      const el = document.createElement('div');
      el.className = 'floating-taunt';
      el.textContent = text;
      el.style.color = color;

      // Calculate Safe Spawning Zones (Left, Right, Top, or Bottom margins around the card)
      const cardRect = card.getBoundingClientRect();
      const screenWidth = window.innerWidth;
      const screenHeight = window.innerHeight;

      let spawnX, spawnY;

      // On mobile screens, spawn floating elements in margins outside the central card bounding box
      if (Math.random() > 0.5) {
        // Spawn on the Left or Right sides of the card
        spawnX = Math.random() > 0.5 
          ? Math.random() * (cardRect.left - 60) // Left side
          : cardRect.right + Math.random() * (screenWidth - cardRect.right - 60); // Right side
        spawnY = cardRect.top + (Math.random() * cardRect.height * 0.8);
      } else {
        // Spawn Above or Below the card
        spawnX = Math.random() * (screenWidth - 100);
        spawnY = Math.random() > 0.5 
          ? Math.random() * (cardRect.top - 40) // Above card
          : cardRect.bottom + Math.random() * (screenHeight - cardRect.bottom - 40); // Below card
      }

      // Fallback constraints if margins are narrow
      spawnX = Math.max(10, Math.min(spawnX, screenWidth - 120));
      spawnY = Math.max(20, Math.min(spawnY, screenHeight - 60));

      const randomRotation = (Math.random() - 0.5) * 20; // Subtle rotation (-10deg to 10deg)

      el.style.left = `${spawnX}px`;
      el.style.top = `${spawnY}px`;
      el.style.setProperty('--rot', `${randomRotation}deg`);

      document.body.appendChild(el);

      setTimeout(() => { el.remove(); }, 3000);
    }
  </script>
</body>
</html>
