<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Guessing Game</title>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f4f4f9; }
    .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 300px; }
    input { width: 80%; padding: 0.5rem; font-size: 1rem; margin-bottom: 1rem; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 0.5rem 1rem; font-size: 1rem; background: #0066ff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    .feedback { margin-top: 1rem; font-weight: bold; min-height: 24px; }
    .win { color: green; }
    .info { color: #d97706; }
  </style>
</head>
<body>

  <div class="card">
    <h2>Guess (1-100)</h2>
    <form id="guess-form">
      <input type="number" id="guess-input" min="1" max="100" required placeholder="Enter number...">
      <button type="submit">Submit Guess</button>
    </form>

    <div id="feedback" class="feedback"></div>
    <div id="attempt-counter" style="color: #666; font-size: 0.85rem; margin-top: 0.5rem;"></div>
  </div>

  <script>
    const form = document.getElementById('guess-form');
    const guessInput = document.getElementById('guess-input');
    const feedback = document.getElementById('feedback');
    const attemptCounter = document.getElementById('attempt-counter');

    form.addEventListener('submit', async function(e) {
      // Prevent the page from refreshing on form submit
      e.preventDefault();

      const userGuess = guessInput.value;

      // Send the AJAX request to Flask endpoint
      const response = await fetch('/guess', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ guess: userGuess })
      });

      const data = await response.json();

      // Update the UI dynamically based on the JSON response
      feedback.textContent = data.message;
      attemptCounter.textContent = `Attempts: ${data.attempts}`;

      if (data.status === 'win') {
        feedback.className = 'feedback win';
        guessInput.value = '';
      } else {
        feedback.className = 'feedback info';
        guessInput.select(); // Highlight input field for fast re-typing
      }
    });
  </script>
</body>
</html>
